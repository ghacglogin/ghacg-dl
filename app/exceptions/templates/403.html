<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 访问受限</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --text-primary: #171717;
            --text-secondary: #737373;
            --divider: #e5e5e5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-primary: #ededed;
                --text-secondary: #a3a3a3;
                --divider: #262626;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }

        .error-code {
            font-size: 3rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .divider {
            width: 1px;
            height: 4rem;
            background-color: var(--divider);
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 500;
        }

        .message {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        @media (max-width: 640px) {
            .container {
                flex-direction: column;
                text-align: center;
                gap: 1.5rem;
            }
            .divider {
                width: 3rem;
                height: 1px;
            }
            .content {
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">403</div>
        <div class="divider"></div>
        <div class="content">
            <h1 class="title">访问受限</h1>
            <p class="message">对不起！您没有权限访问此资源。</p>
        </div>
    </div>
</body>
</html>
